<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaceAI - Face Intelligence Platform</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src *;"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/camera.css" />
    <link rel="stylesheet" href="css/report.css" />
    <link rel="stylesheet" href="css/developer.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4.1646425229/face_detection.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">FaceAI</h1>
      <span class="header__version">v0.1</span>
    </header>

    <main class="main" role="main">
      <!-- Backend Status (hanya developer) -->
      <section
        class="status-panel dev-only"
        id="backend-status"
        aria-label="Status backend"
      >
        <h2 class="status-panel__title">Backend Status</h2>
        <p class="status-panel__value status-panel__value--disconnected">
          Not Connected
        </p>
      </section>

      <!-- Panduan pengguna (hanya muncul saat kamera aktif) -->
      <div id="user-guidance" class="user-guidance" aria-live="polite">
        <p id="guidance-text"></p>
      </div>

      <!-- Camera Preview -->
      <section
        class="camera-preview"
        id="camera-preview"
        aria-label="Pratinjau kamera"
      >
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="face-canvas" aria-hidden="true"></canvas>
        <div class="camera-preview__placeholder" id="camera-placeholder">
          <p class="camera-preview__text">Kamera belum dimulai</p>
        </div>

        <!-- Overlay hitung mundur -->
        <div id="countdown-overlay" class="countdown-overlay">
          <span id="countdown-text" class="countdown-overlay__text"></span>
        </div>

        <!-- Gambar hasil capture -->
        <img
          id="capture-preview"
          class="capture-preview-img"
          style="display: none"
          alt="Hasil foto"
        />

        <!-- Tombol capture (pindah ke dalam camera-preview) -->
        <div id="capture-buttons" class="capture-buttons" style="display: none">
          <button
            id="retake-btn"
            class="btn btn--secondary"
            aria-label="Ulangi foto"
          >
            Foto Ulang
          </button>
          <button
            id="continue-btn"
            class="btn btn--primary"
            aria-label="Nilai sekarang"
          >
            Nilai
          </button>
        </div>
      </section>

      <!-- Indikator sistem (hanya developer) -->
      <section
        class="system-status dev-only"
        id="system-status"
        aria-label="Status sistem"
      >
        <div class="system-status__item" id="status-backend">
          <span class="system-status__label">Backend</span>
          <span class="system-status__dot system-status__dot--inactive"></span>
        </div>
        <div class="system-status__item" id="status-camera">
          <span class="system-status__label">Camera</span>
          <span class="system-status__dot system-status__dot--inactive"></span>
        </div>
        <div class="system-status__item" id="status-face">
          <span class="system-status__label">Face</span>
          <span class="system-status__dot system-status__dot--inactive"></span>
        </div>
      </section>

      <!-- Preview alignment (hanya developer) -->
      <div
        id="align-preview"
        class="align-preview dev-only"
        aria-label="Pratinjau wajah ter-align"
      >
        <canvas id="align-canvas" width="150" height="150"></canvas>
        <span class="align-preview__label">Aligned</span>
      </div>

      <!-- Tombol mulai kamera -->
      <button
        class="btn btn--primary"
        id="start-camera-btn"
        aria-label="Mulai kamera"
      >
        Mulai Kamera
      </button>

      <!-- Camera Controls (Fase 12.13-14) -->
      <div class="camera-controls" id="camera-controls" style="display: none">
        <div class="control-row">
          <label for="camera-select">📷 Kamera</label>
          <select id="camera-select" class="camera-select"></select>
        </div>
        <div class="control-row">
          <label class="mirror-label">
            <input type="checkbox" id="mirror-toggle" checked /> Mirror
          </label>
        </div>
      </div>

      <!-- Pesan error -->
      <p class="camera-error" id="camera-error" role="alert"></p>

      <!-- Indikator siap (hanya developer) -->
      <div
        id="ready-indicator"
        class="dev-only"
        style="display: none; text-align: center"
        aria-live="polite"
      >
        <div style="font-size: 1.2rem; font-weight: bold; color: #22c55e">
          ✅ Ready to Capture
        </div>
      </div>

      <!-- Panel debug kualitas (hanya developer) -->
      <div
        id="quality-debug"
        class="dev-only"
        style="display: none"
        aria-label="Informasi debug kualitas"
      >
        <strong>Quality Debug</strong>
        <pre
          id="quality-debug-text"
          style="
            margin: 0.5rem 0 0 0;
            white-space: pre-wrap;
            font-family: monospace;
          "
        ></pre>
      </div>

      <!-- Laporan analisis -->
      <div
        id="report-container"
        class="report-container"
        style="display: none"
        aria-label="Laporan analisis"
      >
        <h2>Laporan Analisis Wajah</h2>
        <div id="report-content"></div>
      </div>

      <!-- Panel riwayat (hanya developer) -->
      <div
        id="history-panel"
        class="history-panel dev-only"
        style="display: none"
        aria-label="Riwayat analisis"
      >
        <div class="history-header">
          <h3>Riwayat Analisis</h3>
          <button
            id="close-history-btn"
            class="btn btn--small"
            aria-label="Tutup riwayat"
          >
            Tutup
          </button>
        </div>
        <div id="history-list"></div>
        <div id="history-detail" style="display: none"></div>
      </div>
    </main>

    <script src="js/core/config.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/geometry.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/ui/ui.js"></script>
    <script src="js/ui/drawing.js"></script>
    <script src="js/core/camera.js"></script>
    <script src="js/modules/detection.js"></script>
    <script src="js/modules/quality.js"></script>
    <script src="js/modules/upload.js"></script>
    <script src="js/modules/capture.js"></script>
    <script src="js/modules/history.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
